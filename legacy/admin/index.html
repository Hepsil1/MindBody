<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Адмін | MIND BODY</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-primary: #4A9B8C;
            --color-primary-dark: #3A7B6C;
            --color-bg: #f5f5f5;
            --color-white: #ffffff;
            --color-text: #1A1A1A;
            --color-text-muted: #666;
            --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.08);
            --radius-lg: 16px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #4A9B8C 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: var(--color-white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            padding: 48px;
            width: 100%;
            max-width: 420px;
        }

        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo h1 {
            font-size: 24px;
            font-weight: 600;
            color: var(--color-text);
        }

        .login-logo span {
            display: block;
            font-size: 13px;
            color: var(--color-text-muted);
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--color-text);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            font-size: 15px;
            font-family: inherit;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            transition: all 0.2s;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 4px rgba(74, 155, 140, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            color: white;
            background: var(--color-primary);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-login:hover {
            background: var(--color-primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(74, 155, 140, 0.3);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #FEE2E2;
            color: #DC2626;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            color: var(--color-text-muted);
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            color: var(--color-primary);
        }
    </style>
    <link rel="stylesheet" href="../src/css/toast.css?v=2.0">
    <link rel="stylesheet" href="../src/css/modal.css?v=2.0">
    <script src="../src/js/toast.js?v=2.0"></script>
    <script src="../src/js/modal.js?v=2.0"></script>
</head>

<body>
    <div class="login-container">
        <div class="login-logo">
            <h1>🔧 MIND BODY</h1>
            <span>Адмін-панель</span>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-input" placeholder="admin@mindbody.ua" required>
            </div>

            <div class="form-group">
                <label class="form-label">Пароль</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login" id="submitBtn">Увійти</button>
        </form>

        <a href="../index.html" class="back-link">← Повернутися на сайт</a>
    </div>

    <script>
        const API_URL = 'http://localhost:4444';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submitBtn');
            const errorEl = document.getElementById('errorMessage');

            // Reset error
            errorEl.classList.remove('show');
            btn.disabled = true;
            btn.textContent = 'Завантаження...';

            try {
                const formData = new URLSearchParams();
                formData.append('username', email);
                formData.append('password', password);

                const response = await fetch(`${API_URL}/token`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: formData
                });

                if (!response.ok) {
                    throw new Error('Невірний email або пароль');
                }

                const data = await response.json();

                // Store token
                localStorage.setItem('admin_token', data.access_token);

                // Redirect to dashboard
                window.location.href = 'dashboard.html';

            } catch (error) {
                errorEl.textContent = error.message || 'Помилка входу';
                errorEl.classList.add('show');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Увійти';
            }
        });
    </script>
</body>

</html>
